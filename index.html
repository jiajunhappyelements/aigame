<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sling Guardians Prototype</title>
    <link rel="preload" as="image" href="assets/ui/弹弓传奇.png" />
    <link rel="preload" as="image" href="assets/ui/loading-bg.png" />
    <style>
      #boot-screen {
        position: fixed;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #101c25;
        pointer-events: none;
        opacity: 1;
        visibility: visible;
        transition: opacity 220ms ease, visibility 0s linear 220ms;
      }

      #boot-screen.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      #boot-frame {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        aspect-ratio: 9 / 16;
        background: url("assets/ui/弹弓传奇.png") center center / cover no-repeat;
        image-rendering: pixelated;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04), 0 22px 64px rgba(0, 0, 0, 0.35);
      }

      #boot-frame::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 58px;
        width: 28px;
        height: 28px;
        margin-left: -14px;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: rgba(255, 255, 255, 0.9);
        animation: boot-spin 0.9s linear infinite;
      }

      #boot-frame::before {
        content: "加载中...";
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.85);
      }

      @keyframes boot-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BJMxMpLv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DaUSnRdx.css">
  </head>
  <body>
    <div id="boot-screen" aria-hidden="true">
      <div id="boot-frame"></div>
    </div>
    <div id="game"></div>
  </body>
</html>
